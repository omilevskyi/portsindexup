---
name: Publish release
on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }} # pick PR's HEAD instead of merge commit
          fetch-depth: 0
          show-progress: "false"

      - name: Save commit message to file
        id: commit
        run: |
          FILE=$(mktemp --tmpdir=${{ runner.temp }})
          set -o pipefail && git --no-pager log -1 --no-color --pretty=%B | tee "${FILE}"
          echo "file=${FILE}" >>"${GITHUB_OUTPUT}"

      - name: Verify if commit is conventional
        uses: cocogitto/cocogitto-action@52d0023b4396897f1815648e553db2ab8d782f3a # v4.2.0
        with:
          command: verify
          args: --ignore-merge-commits --ignore-fixup-commits --file ${{ steps.commit.outputs.file }}

      - name: Remove temporary file
        run: rm --force -- ${{ steps.commit.outputs.file }}

      - name: Get next version
        id: version
        run: |
          NEXT=$(cog bump --auto --dry-run | sed --silent --regexp-extended 's/^v([[:digit:].]+)$/\1/p')
          echo "next=${NEXT}" >>"${GITHUB_OUTPUT}"

      - name: Setup Go
        if: steps.version.outputs.next != ''
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
          check-latest: true
          cache: true

      - name: Disable Go telemetry
        if: steps.version.outputs.next != ''
        run: go telemetry off

      - name: Run tests
        if: steps.version.outputs.next != ''
        run: go test -v ./...

      - name: Push next version
        if: steps.version.outputs.next != ''
        run: |
          git --no-pager config user.name 'Publish Release'
          git --no-pager config user.email 'publish-release@github.com'
          git --no-pager tag --force --annotate 'v${{ steps.version.outputs.next }}' --message 'v${{ steps.version.outputs.next }}'
          git --no-pager push --force origin 'HEAD:refs/tags/v${{ steps.version.outputs.next }}'

      - name: Install Cosign
        if: steps.version.outputs.next != ''
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v2.6.1

      - name: Run GoReleaser
        if: steps.version.outputs.next != ''
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
          COSIGN_EXPERIMENTAL: 1
